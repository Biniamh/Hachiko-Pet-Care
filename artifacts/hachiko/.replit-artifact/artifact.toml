kind = "web"
previewPath = "/"
title = "Hachiko Pet Care"
version = "1.0.0"
id = "artifacts/hachiko"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25203

[services.development]
run = "pnpm --filter @workspace/hachiko run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hachiko", "run", "build" ]
publicDir = "artifacts/hachiko/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25203"
BASE_PATH = "/"
